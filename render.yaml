services:
  # Backend - NestJS API
  - type: web
    name: buildflow-backend
    runtime: node
    rootDir: apps/backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/main
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: buildflow-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 3002
      - key: NODE_ENV
        value: production

  # Frontend - Next.js
  - type: web
    name: buildflow-frontend
    runtime: node
    rootDir: apps/frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: buildflow-backend
          type: web
          property: host

databases:
  - name: buildflow-db
    plan: free
